<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bloomberg Terminal Interface</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        body { font-family: Arial, sans-serif; }
        #chartContainer { width: 80%; margin: auto; }
        #fearGreedIndex, #bitcoinPrice, #bip110Indicators { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Bloomberg Terminal Interface</h1>
    <div id="chartContainer">
        <div id="candlestickChart"></div>
        <div id="fearGreedIndex"></div>
        <div id="bitcoinPrice"></div>
        <div id="bip110Indicators"></div>
    </div>

    <script>
        // Candlestick Chart
        new TradingView.widget({
            "container_id": "candlestickChart",
            "width": 800,
            "height": 400,
            "symbol": "NASDAQ:AAPL",
            "interval": "D",
            "timezone": "Etc/UTC",
            "theme": "light",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#f1f3f6",
            "enable_publishing": false,
            "allow_symbol_change": true,
            "hideideas": true,
        });

        // Fear & Greed Index
        fetch('https://api.alternativedata.org/v1/fear-greed-index')
            .then(response => response.json())
            .then(data => {
                document.getElementById('fearGreedIndex').innerHTML = `<h2>Fear & Greed Index</h2><p>${data.index}</p>`;
            });

        // Bitcoin Price
        fetch('https://api.coindesk.com/v1/bpi/currentprice/BTC.json')
            .then(response => response.json())
            .then(data => {
                document.getElementById('bitcoinPrice').innerHTML = `<h2>Bitcoin Price</h2><p>$${data.bpi.USD.rate}</p>`;
            });

        // BIP-110 Signalling Indicators (Mockup since real-time data may vary)
        fetch('https://api.blockchain.info/stats')
            .then(response => response.json())
            .then(data => {
                document.getElementById('bip110Indicators').innerHTML = `<h2>BIP-110 Indicators</h2><p>Signalling Block Size: ${data.hash_rate} TH/s</p>`;
            });
    </script>
</body>
</html>
